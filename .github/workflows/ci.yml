name: CI

on:
  push:
    branches:
      - main
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install gitleaks CLI
        if: matrix.node-version == 20
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.24.2/gitleaks_8.24.2_linux_x64.tar.gz -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          install -m 0755 gitleaks "$RUNNER_TEMP/gitleaks"
          echo "$RUNNER_TEMP" >> "$GITHUB_PATH"

      - name: Secret scan
        if: matrix.node-version == 20
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          PUSH_SHA: ${{ github.sha }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          gitleaks version
          if [[ "$EVENT_NAME" == "pull_request" && -n "$PR_BASE_SHA" && -n "$PR_HEAD_SHA" ]]; then
            RANGE="$PR_BASE_SHA..$PR_HEAD_SHA"
          elif [[ -n "$BEFORE_SHA" && "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]]; then
            RANGE="$BEFORE_SHA..$PUSH_SHA"
          else
            RANGE="$PUSH_SHA"
          fi

          echo "Scanning git range: $RANGE"
          gitleaks git --log-opts="$RANGE" --redact --no-banner

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run incremental typecheck
        run: npm run typecheck

      - name: Build dist CLI
        run: npm run build

      - name: Smoke test dist CLI
        run: npm run build:smoke

      - name: Run npm pack gate
        if: matrix.node-version == 20
        run: npm run pack:check

      - name: Run release discipline gate
        run: npm run release:check

      - name: Run portable tests
        run: npm test

      - name: Run mandatory domain eval gate
        run: npm run eval:domains

      - name: Run North Star quality gate
        run: npm run northstar:check -- --min-runs 20 --min-blocked-runs 1 --min-prevented-errors 1 --min-prevented-error-rate 0.005

      - name: Run retrieval-first RAG gate
        if: matrix.node-version == 20
        run: npm run benchmark:retrieval-gate

      - name: Run RAG golden-set gate
        if: matrix.node-version == 20
        run: npm run benchmark:golden-set

      - name: Run memory poisoning gate
        if: matrix.node-version == 20
        run: npm run benchmark:memory-poisoning

      - name: Run conversation noise stress gate
        if: matrix.node-version == 20
        run: npm run benchmark:conversation-noise

      - name: Run fine-tuning readiness gate
        if: matrix.node-version == 20
        run: npm run ft:readiness

      - name: Run FT-1 format pilot gate
        if: matrix.node-version == 20
        run: npm run benchmark:ft1-format

      - name: Run security pipeline quality gate
        run: npm run security:pipeline:example

      - name: Upload security pipeline artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: security-pipeline-node-${{ matrix.node-version }}
          path: |
            test-output/security-pipeline/security-chunks.json
            test-output/security-pipeline/security-teach.json
          if-no-files-found: warn

      - name: Comment security pipeline summary on PR
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false && matrix.node-version == 20
        uses: actions/github-script@v8
        env:
          NODE_VERSION: ${{ matrix.node-version }}
        with:
          script: |
            const fs = require("node:fs");
            const path = require("node:path");
            const { pathToFileURL } = require("node:url");

            const summaryModuleUrl = pathToFileURL(
              path.join(process.cwd(), "src", "ci", "security-pr-summary.js")
            ).href;
            const {
              SECURITY_PIPELINE_SUMMARY_MARKER,
              buildSecurityPipelineSummaryComment
            } = await import(summaryModuleUrl);

            const chunksPath = path.join(process.cwd(), "test-output", "security-pipeline", "security-chunks.json");
            const teachPath = path.join(process.cwd(), "test-output", "security-pipeline", "security-teach.json");

            if (!fs.existsSync(chunksPath) || !fs.existsSync(teachPath)) {
              core.warning("Security pipeline files are missing; skipping PR summary comment.");
              return;
            }

            const chunksPayload = JSON.parse(fs.readFileSync(chunksPath, "utf8"));
            const teachPayload = JSON.parse(fs.readFileSync(teachPath, "utf8"));

            const issue_number = context.issue.number;
            const { owner, repo } = context.repo;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100
            });
            const existing = comments.find(
              (comment) =>
                comment.user?.type === "Bot" &&
                comment.body?.includes(SECURITY_PIPELINE_SUMMARY_MARKER)
            );
            const summary = buildSecurityPipelineSummaryComment({
              nodeVersion: process.env.NODE_VERSION ?? "",
              chunksPayload,
              teachPayload,
              previousCommentBody: existing?.body ?? ""
            });
            const body = summary.body;

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });
            }

      - name: Run selector benchmark
        run: npm run benchmark

      - name: Run foundations stress benchmark
        run: npm run benchmark:foundations

      - name: Run recall benchmark
        run: npm run benchmark:recall

      - name: Run vertical benchmark
        run: npm run benchmark:vertical
