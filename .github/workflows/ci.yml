name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Run incremental typecheck
        run: npm run typecheck

      - name: Build dist CLI
        run: npm run build

      - name: Smoke test dist CLI
        run: npm run build:smoke

      - name: Run portable tests
        run: npm test

      - name: Run selector benchmark
        run: npm run benchmark

      - name: Run recall benchmark
        run: npm run benchmark:recall

      - name: Run vertical benchmark
        run: npm run benchmark:vertical
